<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wiggle gram</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&display=swap');

  :root {
    --bg: #070707;
    --surface: #0f0f0f;
    --border: #1e1e1e;
    --border-active: #2e2e2e;
    --green: #39ff84;
    --green-dim: #1a7a3e;
    --amber: #ffb830;
    --red: #ff3b3b;
    --text: #c8c8c8;
    --text-dim: #555;
    --text-bright: #f0f0f0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
    min-height: 100vh;
    padding: 2rem;
    font-size: 13px;
    line-height: 1.6;
  }

  /* scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.06) 2px,
      rgba(0,0,0,0.06) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--green);
    letter-spacing: 0.05em;
    text-shadow: 0 0 20px rgba(57, 255, 132, 0.4);
  }

  .sub {
    color: var(--text-dim);
    font-size: 0.75rem;
    letter-spacing: 0.08em;
  }

  /* ─── MAIN LAYOUT ─────────────────────────────────────────── */
  .app-layout {
    display: flex;
    gap: 1.5rem;
    align-items: flex-start;
  }

  .left-panel {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .right-panel {
    width: 320px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  /* ─── PREVIEWS ────────────────────────────────────────────── */
  .previews {
    display: none;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  .previews.visible { display: grid; }

  .preview-panel {
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .preview-label {
    padding: 0.4rem 0.75rem;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .preview-panel canvas,
  .preview-panel img {
    display: block;
    width: 100%;
    max-height: 350px;
    object-fit: contain;
    background: #000;
  }

  /* ─── GIF PREVIEW ─────────────────────────────────────────── */
  .gif-preview-panel {
    display: none;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .gif-preview-panel.visible { display: block; }

  .gif-preview-panel .preview-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .gif-preview-panel img {
    display: block;
    width: 100%;
    max-height: 500px;
    object-fit: contain;
    background: #000;
  }

  .download-btn {
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    padding: 0.2rem 0.7rem;
    font-family: inherit;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .download-btn:hover {
    background: var(--green);
    color: #000;
  }

  /* ─── UPLOAD BUTTONS ──────────────────────────────────────── */
  .upload-section {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .upload-btn {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--surface);
    border: 1px solid var(--border-active);
    color: var(--text);
    padding: 0.6rem 0.8rem;
    font-family: inherit;
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
    text-align: left;
  }
  .upload-btn:hover {
    border-color: var(--green-dim);
    color: var(--text-bright);
  }
  .upload-btn.loaded {
    border-color: var(--green-dim);
    color: var(--green);
  }
  .upload-btn .label-text {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .upload-btn input { display: none; }

  #depthUploadBtn { display: none; }
  #depthUploadBtn.visible { display: flex; }

  /* ─── TWEAKPANE CONTAINER ─────────────────────────────────── */
  #tweakpane-container {
    width: 100%;
  }
  /* Override Tweakpane border colors to match our theme */
  #tweakpane-container .tp-dfwv {
    width: 100% !important;
  }

  /* ─── GENERATE BUTTON ─────────────────────────────────────── */
  button#generateBtn {
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    padding: 0.6rem 1.8rem;
    font-family: inherit;
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
  }
  button#generateBtn:hover:not(:disabled) {
    background: var(--green);
    color: #000;
  }
  button#generateBtn:disabled {
    border-color: var(--border-active);
    color: var(--text-dim);
    cursor: not-allowed;
  }

  /* ─── STATUS / PROGRESS ───────────────────────────────────── */
  .status {
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }
  .status.working { color: var(--amber); }
  .status.done { color: var(--green); }
  .status.error { color: var(--red); }

  .progress-track {
    width: 100%;
    height: 1px;
    background: var(--border);
    display: none;
  }
  .progress-track.visible { display: block; }
  .progress-fill {
    height: 100%;
    background: var(--green);
    transition: width 0.1s;
    box-shadow: 0 0 8px var(--green);
  }

  /* ─── NOTE ────────────────────────────────────────────────── */
  .note {
    padding: 0.75rem 1rem;
    border-left: 2px solid var(--border-active);
    color: var(--text-dim);
    font-size: 0.72rem;
    line-height: 1.7;
  }
  .note a { color: var(--green-dim); text-decoration: none; }
  .note a:hover { color: var(--green); }

  .clear-link {
    color: var(--red);
    font-size: 0.65rem;
    text-decoration: none;
    cursor: pointer;
  }
  .clear-link:hover { text-decoration: underline; }

  @media (max-width: 800px) {
    .app-layout {
      flex-direction: column;
    }
    .right-panel {
      width: 100%;
    }
    .previews.visible { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>wiggle gram</h1>
  <div class="sub">luminance &rarr; depth &rarr; parallax &rarr; gif</div>
</header>

<div class="app-layout">
  <!-- LEFT PANEL: previews, GIF, status -->
  <div class="left-panel">
    <div class="previews" id="previews">
      <div class="preview-panel">
        <div class="preview-label">source</div>
        <canvas id="srcCanvas"></canvas>
      </div>
      <div class="preview-panel">
        <div class="preview-label">
          <span id="depthSourceLabel">depth map (luminance proxy)</span>
          <a href="#" id="clearDepth" class="clear-link" style="display:none" onclick="clearCustomDepth(event)">[clear]</a>
        </div>
        <canvas id="depthCanvas"></canvas>
      </div>
    </div>

    <div class="gif-preview-panel" id="gifPreviewPanel">
      <div class="preview-label">
        <span>output</span>
        <button class="download-btn" id="downloadBtn" onclick="downloadGif()">download</button>
      </div>
      <img id="gifPreview" alt="generated wigglegram">
    </div>

    <div class="status" id="status">load an image to begin</div>
    <div class="progress-track" id="progressTrack">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>

    <div class="note">
      bright pixels = near (unless inverted). for a real depth map, run
      <a href="https://github.com/Dreamaker-MrC/Any-Resolution-Any-Geometry" target="_blank">ARAG</a>
      locally and supply the output via the depth map upload button.
    </div>
  </div>

  <!-- RIGHT PANEL: uploads, tweakpane, generate -->
  <div class="right-panel">
    <div class="upload-section">
      <label class="upload-btn" id="sourceUploadBtn">
        <span class="label-text">Upload Source Image</span>
        <input type="file" id="fileInput" accept="image/*">
      </label>
      <label class="upload-btn" id="depthUploadBtn">
        <span class="label-text">Upload Depth Map (optional)</span>
        <input type="file" id="depthInput" accept="image/*">
      </label>
    </div>

    <div id="tweakpane-container"></div>

    <button id="generateBtn" disabled onclick="generate()">generate gif</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
<script type="module">
  // ─── TWEAKPANE IMPORT ───────────────────────────────────────────────────────
  const Tweakpane = await import('https://cdn.jsdelivr.net/npm/tweakpane@4.0.5/dist/tweakpane.min.js');

  // ─── PARAMS ─────────────────────────────────────────────────────────────────
  const PARAMS = {
    mode: 'orbit',
    baseline: 6.5,
    frames: 8,
    frameDelay: 80,
    fov: 45,
    bokehCoc: 8,
    focusDist: 0.5,
    lightWrap: 2,
    chromaticAberr: 0.8,
    outputWidth: 800,
    invertDepth: false,
  };

  // ─── STATE ──────────────────────────────────────────────────────────────────
  let srcImageData = null;
  let customDepthData = null;
  let customDepthFilename = null;
  let currentDepthMap = null;
  let blueNoise = null;
  let gifBlobUrl = null;

  // ─── BLUE NOISE LOADER ──────────────────────────────────────────────────────
  (async function loadBlueNoise() {
    try {
      const resp = await fetch('./assets/LDR_LLL1_0.png');
      if (!resp.ok) throw new Error('not found');
      const blob = await resp.blob();
      const bmp = await createImageBitmap(blob);
      const c = document.createElement('canvas');
      c.width = 64; c.height = 64;
      const ctx = c.getContext('2d');
      ctx.drawImage(bmp, 0, 0);
      const px = ctx.getImageData(0, 0, 64, 64).data;
      blueNoise = new Float32Array(64 * 64);
      for (let i = 0; i < 64 * 64; i++) blueNoise[i] = px[i * 4] / 255;
    } catch (e) {
      console.warn('blue noise load failed, using white noise fallback', e);
      blueNoise = new Float32Array(64 * 64);
      for (let i = 0; i < 64 * 64; i++) blueNoise[i] = Math.random();
    }
  })();

  // ─── TWEAKPANE SETUP ───────────────────────────────────────────────────────
  let fovBinding = null;
  let baselineBinding = null;

  function setupTweakpane() {
    const pane = new Tweakpane.Pane({
      container: document.getElementById('tweakpane-container'),
      title: 'parameters',
    });

    // ── Motion folder ──
    const motion = pane.addFolder({ title: 'Motion' });

    motion.addBinding(PARAMS, 'mode', {
      label: 'effect mode',
      options: {
        'orbit': 'orbit',
        'parallax': 'parallax',
        'warp': 'warp',
      },
    }).on('change', (ev) => {
      updateModeUI(ev.value);
    });

    baselineBinding = motion.addBinding(PARAMS, 'baseline', {
      label: 'baseline',
      min: 1, max: 15, step: 0.5,
    });

    motion.addBinding(PARAMS, 'frames', {
      label: 'frames',
      min: 4, max: 20, step: 2,
    });

    motion.addBinding(PARAMS, 'frameDelay', {
      label: 'frame delay (ms)',
      min: 30, max: 200, step: 10,
    });

    fovBinding = motion.addBinding(PARAMS, 'fov', {
      label: 'fov',
      min: 20, max: 80, step: 1,
    });

    // ── Optics folder ──
    const optics = pane.addFolder({ title: 'Optics' });

    optics.addBinding(PARAMS, 'bokehCoc', {
      label: 'bokeh coc',
      min: 0, max: 40, step: 1,
    }).on('change', () => updateDepthPreview());

    optics.addBinding(PARAMS, 'focusDist', {
      label: 'focus dist',
      min: 0, max: 1, step: 0.01,
    });

    optics.addBinding(PARAMS, 'lightWrap', {
      label: 'light wrap',
      min: 0, max: 5, step: 0.5,
    });

    optics.addBinding(PARAMS, 'chromaticAberr', {
      label: 'chromatic aberr',
      min: 0, max: 1.5, step: 0.1,
    });

    // ── Output folder ──
    const output = pane.addFolder({ title: 'Output' });

    output.addBinding(PARAMS, 'outputWidth', {
      label: 'output width',
      min: 200, max: 3000, step: 100,
    });

    output.addBinding(PARAMS, 'invertDepth', {
      label: 'invert depth',
    }).on('change', () => updateDepthPreview());
  }

  let savedParallaxShift = 20;

  function updateModeUI(mode) {
    if (mode === 'orbit') {
      savedParallaxShift = PARAMS.baseline;
      PARAMS.baseline = 6.5;
      fovBinding.hidden = false;
      baselineBinding.dispose();
      // Recreate with orbit range
      const motionFolder = fovBinding.parent;
      baselineBinding = motionFolder.addBinding(PARAMS, 'baseline', {
        label: 'baseline',
        min: 1, max: 15, step: 0.5,
      });
      // Move it to index 1 (after mode)
      motionFolder.remove(baselineBinding);
      motionFolder.add(baselineBinding, 1);
    } else {
      if (PARAMS.mode !== mode) {
        // switching away from orbit or between parallax/warp
      }
      PARAMS.baseline = savedParallaxShift;
      fovBinding.hidden = true;
      baselineBinding.dispose();
      const motionFolder = fovBinding.parent;
      baselineBinding = motionFolder.addBinding(PARAMS, 'baseline', {
        label: 'parallax shift',
        min: 3, max: 60, step: 1,
      });
      motionFolder.remove(baselineBinding);
      motionFolder.add(baselineBinding, 1);
    }
  }

  setupTweakpane();

  // ─── FILE UPLOAD HANDLERS ──────────────────────────────────────────────────
  document.getElementById('fileInput').addEventListener('change', (e) => {
    if (e.target.files[0]) loadSourceImage(e.target.files[0]);
  });

  document.getElementById('depthInput').addEventListener('change', (e) => {
    if (e.target.files[0]) loadCustomDepth(e.target.files[0]);
  });

  // ─── IMAGE LOADING ─────────────────────────────────────────────────────────
  function loadSourceImage(file) {
    const img = new Image();
    img.onload = () => {
      const canvas = document.getElementById('srcCanvas');
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      srcImageData = ctx.getImageData(0, 0, img.width, img.height);
      customDepthData = null;
      customDepthFilename = null;
      updateDepthSourceLabel();

      document.getElementById('previews').classList.add('visible');
      document.getElementById('depthUploadBtn').classList.add('visible');
      document.getElementById('generateBtn').disabled = false;

      // Update source upload button
      const btn = document.getElementById('sourceUploadBtn');
      btn.classList.add('loaded');
      btn.querySelector('.label-text').textContent = file.name;

      // Reset depth upload button
      const depthBtn = document.getElementById('depthUploadBtn');
      depthBtn.classList.remove('loaded');
      depthBtn.querySelector('.label-text').textContent = 'Upload Depth Map (optional)';

      updateDepthPreview();
      setStatus('ready  \u00b7  ' + img.width + '\u00d7' + img.height, '');
    };
    img.src = URL.createObjectURL(file);
  }

  function loadCustomDepth(file) {
    if (!srcImageData) return;
    const img = new Image();
    img.onload = () => {
      const sw = srcImageData.width, sh = srcImageData.height;
      const tooFar = Math.abs(img.width - sw) > 4 || Math.abs(img.height - sh) > 4;
      if (tooFar) {
        setStatus('depth map dimensions too different from source (' + sw + '\u00d7' + sh + ')', 'error');
        return;
      }
      const tmp = document.createElement('canvas');
      tmp.width = sw; tmp.height = sh;
      const ctx = tmp.getContext('2d');
      ctx.drawImage(img, 0, 0, sw, sh);
      customDepthData = ctx.getImageData(0, 0, sw, sh);
      customDepthFilename = file.name;
      updateDepthSourceLabel();

      // Update depth upload button
      const btn = document.getElementById('depthUploadBtn');
      btn.classList.add('loaded');
      btn.querySelector('.label-text').textContent = file.name;

      updateDepthPreview();
      setStatus('using supplied depth map', 'done');
    };
    img.src = URL.createObjectURL(file);
  }

  window.clearCustomDepth = function(e) {
    e.preventDefault();
    customDepthData = null;
    customDepthFilename = null;
    document.getElementById('depthInput').value = '';
    updateDepthSourceLabel();

    const btn = document.getElementById('depthUploadBtn');
    btn.classList.remove('loaded');
    btn.querySelector('.label-text').textContent = 'Upload Depth Map (optional)';

    updateDepthPreview();
    setStatus('reverted to luminance depth', '');
  };

  function updateDepthSourceLabel() {
    const label = document.getElementById('depthSourceLabel');
    const clearLink = document.getElementById('clearDepth');
    if (customDepthData && customDepthFilename) {
      label.textContent = 'depth map (custom: ' + customDepthFilename + ')';
      label.style.color = 'var(--green)';
      clearLink.style.display = 'inline';
    } else {
      label.textContent = 'depth map (luminance proxy)';
      label.style.color = '';
      clearLink.style.display = 'none';
    }
  }

  // ─── CIRCULAR DISC BOKEH ───────────────────────────────────────────────────
  function circularDiscBokeh(srcData, depth, focusDist, cocScale, width, height) {
    if (cocScale <= 0) return srcData;
    const out = new Uint8ClampedArray(srcData.length);
    const noise = blueNoise || null;
    const nSize = 64;

    for (let y = 0; y < height; y++) {
      for (let x = 0; x < width; x++) {
        const idx = y * width + x;
        const R = cocScale * Math.abs(depth[idx] - focusDist);

        if (R < 0.5) {
          const si = idx * 4;
          out[si] = srcData[si]; out[si+1] = srcData[si+1];
          out[si+2] = srcData[si+2]; out[si+3] = srcData[si+3];
          continue;
        }

        const Ri = Math.ceil(R);
        let rSum = 0, gSum = 0, bSum = 0, count = 0;
        const R2 = R * R;

        const ni = ((y % nSize) * nSize + (x % nSize));
        const jitter = noise ? noise[ni] : Math.random();

        for (let dy = -Ri; dy <= Ri; dy++) {
          const sy = y + dy;
          if (sy < 0 || sy >= height) continue;
          for (let dx = -Ri; dx <= Ri; dx++) {
            const dist2 = dx * dx + dy * dy;
            const threshold = R2 + jitter * R;
            if (dist2 > threshold) continue;

            const sx = x + dx;
            if (sx < 0 || sx >= width) continue;

            const si = (sy * width + sx) * 4;
            rSum += srcData[si]; gSum += srcData[si+1]; bSum += srcData[si+2];
            count++;
          }
        }

        const di = idx * 4;
        if (count > 0) {
          out[di] = rSum / count; out[di+1] = gSum / count;
          out[di+2] = bSum / count; out[di+3] = 255;
        } else {
          out[di] = srcData[di]; out[di+1] = srcData[di+1];
          out[di+2] = srcData[di+2]; out[di+3] = srcData[di+3];
        }
      }
    }
    return out;
  }

  // ─── LIGHT WRAP (EDGE BLENDING) ────────────────────────────────────────────
  function applyLightWrap(frameData, depth, radius, width, height) {
    if (radius <= 0) return frameData;
    const out = new Uint8ClampedArray(frameData);

    const grad = new Float32Array(width * height);
    for (let y = 1; y < height - 1; y++) {
      for (let x = 1; x < width - 1; x++) {
        const i = y * width + x;
        const gx = -depth[i - width - 1] + depth[i - width + 1]
                  - 2*depth[i - 1] + 2*depth[i + 1]
                  - depth[i + width - 1] + depth[i + width + 1];
        const gy = -depth[i - width - 1] - 2*depth[i - width] - depth[i - width + 1]
                  + depth[i + width - 1] + 2*depth[i + width] + depth[i + width + 1];
        grad[i] = Math.sqrt(gx * gx + gy * gy);
      }
    }

    const threshold = 0.05;
    const ri = Math.ceil(radius);

    for (let y = 0; y < height; y++) {
      for (let x = 0; x < width; x++) {
        const i = y * width + x;
        if (grad[i] < threshold) continue;

        const centerDepth = depth[i];
        let bgR = 0, bgG = 0, bgB = 0, bgCount = 0;
        for (let dy = -ri; dy <= ri; dy++) {
          const sy = y + dy;
          if (sy < 0 || sy >= height) continue;
          for (let dx = -ri; dx <= ri; dx++) {
            if (dx === 0 && dy === 0) continue;
            const sx = x + dx;
            if (sx < 0 || sx >= width) continue;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > radius) continue;

            const ni = sy * width + sx;
            if (depth[ni] < centerDepth - 0.02) {
              const si = ni * 4;
              const falloff = 1 - dist / radius;
              bgR += frameData[si] * falloff;
              bgG += frameData[si+1] * falloff;
              bgB += frameData[si+2] * falloff;
              bgCount += falloff;
            }
          }
        }

        if (bgCount > 0) {
          const di = i * 4;
          const strength = Math.min(grad[i] / 0.3, 1.0) * 0.5;
          out[di]   = out[di]   * (1 - strength) + (bgR / bgCount) * strength;
          out[di+1] = out[di+1] * (1 - strength) + (bgG / bgCount) * strength;
          out[di+2] = out[di+2] * (1 - strength) + (bgB / bgCount) * strength;
        }
      }
    }
    return out;
  }

  // ─── CHROMATIC ABERRATION ──────────────────────────────────────────────────
  function applyChromaticAberration(frameData, k, angle, width, height) {
    if (k <= 0) return frameData;
    const out = new Uint8ClampedArray(frameData);
    const rShift = k * Math.sin(angle);
    const bShift = -k * Math.sin(angle);

    for (let y = 0; y < height; y++) {
      for (let x = 0; x < width; x++) {
        const di = (y * width + x) * 4;

        const rSrcX = x - rShift;
        const rX0 = Math.floor(rSrcX);
        const rFrac = rSrcX - rX0;
        const rX1 = rX0 + 1;
        if (rX0 >= 0 && rX1 < width) {
          const s0 = (y * width + rX0) * 4;
          const s1 = (y * width + rX1) * 4;
          out[di] = frameData[s0] * (1 - rFrac) + frameData[s1] * rFrac;
        } else if (rX0 >= 0 && rX0 < width) {
          out[di] = frameData[(y * width + rX0) * 4];
        }

        const bSrcX = x - bShift;
        const bX0 = Math.floor(bSrcX);
        const bFrac = bSrcX - bX0;
        const bX1 = bX0 + 1;
        if (bX0 >= 0 && bX1 < width) {
          const s0 = (y * width + bX0) * 4 + 2;
          const s1 = (y * width + bX1) * 4 + 2;
          out[di+2] = frameData[s0] * (1 - bFrac) + frameData[s1] * bFrac;
        } else if (bX0 >= 0 && bX0 < width) {
          out[di+2] = frameData[(y * width + bX0) * 4 + 2];
        }
      }
    }
    return out;
  }

  // ─── DEPTH COMPUTATION ─────────────────────────────────────────────────────
  function computeLuminanceDepth(imageData, invert) {
    const { data, width, height } = imageData;
    const depth = new Float32Array(width * height);
    for (let i = 0; i < width * height; i++) {
      const r = data[i * 4], g = data[i * 4 + 1], b = data[i * 4 + 2];
      depth[i] = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
    }
    if (invert) for (let i = 0; i < depth.length; i++) depth[i] = 1 - depth[i];
    return depth;
  }

  function boxBlur(data, width, height, r) {
    if (r <= 0) return data;
    const temp = new Float32Array(data.length);
    const out = new Float32Array(data.length);
    const ri = Math.floor(r);

    for (let y = 0; y < height; y++) {
      for (let x = 0; x < width; x++) {
        let s = 0;
        for (let dx = -ri; dx <= ri; dx++) {
          s += data[y * width + Math.max(0, Math.min(width - 1, x + dx))];
        }
        temp[y * width + x] = s / (2 * ri + 1);
      }
    }
    for (let y = 0; y < height; y++) {
      for (let x = 0; x < width; x++) {
        let s = 0;
        for (let dy = -ri; dy <= ri; dy++) {
          s += temp[Math.max(0, Math.min(height - 1, y + dy)) * width + x];
        }
        out[y * width + x] = s / (2 * ri + 1);
      }
    }
    return out;
  }

  function getDepthMap(imageData) {
    const invert = PARAMS.invertDepth;
    const smoothR = Math.min(PARAMS.bokehCoc, 4);
    const src = customDepthData || imageData;
    let d = computeLuminanceDepth(src, invert);
    d = boxBlur(d, imageData.width, imageData.height, smoothR);
    d = boxBlur(d, imageData.width, imageData.height, smoothR);
    return d;
  }

  function updateDepthPreview() {
    if (!srcImageData) return;
    const depth = getDepthMap(srcImageData);
    currentDepthMap = depth;

    const canvas = document.getElementById('depthCanvas');
    canvas.width = srcImageData.width;
    canvas.height = srcImageData.height;
    const ctx = canvas.getContext('2d');
    const img = ctx.createImageData(srcImageData.width, srcImageData.height);
    for (let i = 0; i < depth.length; i++) {
      const v = Math.round(depth[i] * 255);
      img.data[i * 4] = v;
      img.data[i * 4 + 1] = v;
      img.data[i * 4 + 2] = v;
      img.data[i * 4 + 3] = 255;
    }
    ctx.putImageData(img, 0, 0);
  }

  // ─── FRAME GENERATION ──────────────────────────────────────────────────────
  const NUM_DEPTH_PASSES = 32;

  function generateFrameParallax(srcData, depth, xOffset, width, height) {
    const out = new Uint8ClampedArray(srcData.buffer.slice(0, width * height * 4));
    for (let pass = 0; pass < NUM_DEPTH_PASSES; pass++) {
      const minD = pass / NUM_DEPTH_PASSES;
      const maxD = (pass + 1) / NUM_DEPTH_PASSES;
      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const idx = y * width + x;
          const d = depth[idx];
          if (d < minD || d >= maxD) continue;
          const dstX = Math.round(x + d * xOffset);
          if (dstX < 0 || dstX >= width) continue;
          const si = idx * 4;
          const di = (y * width + dstX) * 4;
          out[di]     = srcData[si];
          out[di + 1] = srcData[si + 1];
          out[di + 2] = srcData[si + 2];
          out[di + 3] = 255;
        }
      }
    }
    return out;
  }

  function generateFrameWarp(srcData, depth, xOffset, width, height) {
    const out = new Uint8ClampedArray(width * height * 4);
    for (let y = 0; y < height; y++) {
      for (let x = 0; x < width; x++) {
        const d = depth[y * width + x];
        const srcX = Math.max(0, Math.min(width - 1, Math.round(x - d * xOffset)));
        const si = (y * width + srcX) * 4;
        const di = (y * width + x) * 4;
        out[di]     = srcData[si];
        out[di + 1] = srcData[si + 1];
        out[di + 2] = srcData[si + 2];
        out[di + 3] = 255;
      }
    }
    return out;
  }

  function generateFrameOrbit(srcData, depth, baselineCm, width, height) {
    const tx = baselineCm / 100;
    const fovDeg = PARAMS.fov;
    const fx = width / (2 * Math.tan((fovDeg / 2) * Math.PI / 180));

    const zNear = 1.0, zFar = 10.0;
    const Zf = (zNear + zFar) / 2;

    const out = new Uint8ClampedArray(srcData.buffer.slice(0, width * height * 4));
    const written = new Uint8Array(width * height);

    for (let pass = NUM_DEPTH_PASSES - 1; pass >= 0; pass--) {
      const minD = pass / NUM_DEPTH_PASSES;
      const maxD = (pass + 1) / NUM_DEPTH_PASSES;

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const idx = y * width + x;
          const dn = depth[idx];
          if (dn < minD || dn >= maxD) continue;

          const Z = zFar - dn * (zFar - zNear);
          const shift = tx * fx * (1 / Zf - 1 / Z);
          const dstX = Math.round(x + shift);

          if (dstX < 0 || dstX >= width) continue;

          const si = idx * 4;
          const di = (y * width + dstX) * 4;
          out[di]     = srcData[si];
          out[di + 1] = srcData[si + 1];
          out[di + 2] = srcData[si + 2];
          out[di + 3] = 255;
          written[y * width + dstX] = 1;
        }
      }
    }

    // Hole fill: 3-pass 4-neighbor dilation
    for (let p = 0; p < 3; p++) {
      const snap = new Uint8Array(written);
      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const i = y * width + x;
          if (snap[i]) continue;
          let src = -1;
          if (x > 0              && snap[i - 1])     src = i - 1;
          else if (x < width - 1  && snap[i + 1])     src = i + 1;
          else if (y > 0          && snap[i - width])  src = i - width;
          else if (y < height - 1 && snap[i + width])  src = i + width;
          if (src < 0) continue;
          out[i * 4]     = out[src * 4];
          out[i * 4 + 1] = out[src * 4 + 1];
          out[i * 4 + 2] = out[src * 4 + 2];
          out[i * 4 + 3] = 255;
          written[i] = 1;
        }
      }
    }

    return out;
  }

  function generateFrame(srcData, depth, offset, width, height) {
    const mode = PARAMS.mode;
    if (mode === 'orbit')    return generateFrameOrbit(srcData, depth, offset, width, height);
    if (mode === 'warp')     return generateFrameWarp(srcData, depth, offset, width, height);
    return generateFrameParallax(srcData, depth, offset, width, height);
  }

  // ─── STATUS ────────────────────────────────────────────────────────────────
  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status ' + (type || '');
  }

  function setProgress(pct) {
    const track = document.getElementById('progressTrack');
    const fill = document.getElementById('progressFill');
    if (pct >= 0) {
      track.classList.add('visible');
      fill.style.width = pct + '%';
    } else {
      track.classList.remove('visible');
      fill.style.width = '0%';
    }
  }

  // ─── GIF PREVIEW / DOWNLOAD ────────────────────────────────────────────────
  window.downloadGif = function() {
    if (!gifBlobUrl) return;
    const a = document.createElement('a');
    a.href = gifBlobUrl;
    a.download = 'wigglegram.gif';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };

  function showGifPreview(blob) {
    // Revoke old blob URL
    if (gifBlobUrl) URL.revokeObjectURL(gifBlobUrl);
    gifBlobUrl = URL.createObjectURL(blob);

    const panel = document.getElementById('gifPreviewPanel');
    const img = document.getElementById('gifPreview');
    img.src = gifBlobUrl;
    panel.classList.add('visible');
  }

  // Clean up on page unload
  window.addEventListener('beforeunload', () => {
    if (gifBlobUrl) URL.revokeObjectURL(gifBlobUrl);
  });

  // ─── GENERATE ──────────────────────────────────────────────────────────────
  window.generate = async function() {
    const btn = document.getElementById('generateBtn');
    btn.disabled = true;

    const maxShift = PARAMS.baseline;
    const numFrames = PARAMS.frames;
    const frameDelay = PARAMS.frameDelay;
    const maxWidth = PARAMS.outputWidth;
    const cocScale = PARAMS.bokehCoc;
    const focusDist = PARAMS.focusDist;
    const wrapRadius = PARAMS.lightWrap;
    const caStrength = PARAMS.chromaticAberr;

    setStatus('scaling image...', 'working');
    setProgress(0);

    // Scale source image
    let width = srcImageData.width;
    let height = srcImageData.height;
    let scaledSrc = srcImageData;

    if (width > maxWidth) {
      const scale = maxWidth / width;
      width = Math.round(srcImageData.width * scale);
      height = Math.round(srcImageData.height * scale);

      const tmp = document.createElement('canvas');
      tmp.width = width; tmp.height = height;
      const ctx = tmp.getContext('2d');
      ctx.drawImage(document.getElementById('srcCanvas'), 0, 0, width, height);
      scaledSrc = ctx.getImageData(0, 0, width, height);
    }

    // Recompute depth at scaled resolution
    const invert = PARAMS.invertDepth;
    let depth;

    if (customDepthData) {
      const rawCanvas = document.createElement('canvas');
      rawCanvas.width = customDepthData.width; rawCanvas.height = customDepthData.height;
      rawCanvas.getContext('2d').putImageData(customDepthData, 0, 0);
      const tmp = document.createElement('canvas');
      tmp.width = width; tmp.height = height;
      const ctx = tmp.getContext('2d');
      ctx.drawImage(rawCanvas, 0, 0, width, height);
      const scaledDepthData = ctx.getImageData(0, 0, width, height);
      depth = computeLuminanceDepth(scaledDepthData, invert);
    } else {
      depth = computeLuminanceDepth(scaledSrc, invert);
    }
    const depthSmoothR = Math.min(cocScale, 4);
    depth = boxBlur(depth, width, height, depthSmoothR);
    depth = boxBlur(depth, width, height, depthSmoothR);

    setStatus('loading gif encoder...', 'working');

    // Fetch gif.js worker as blob
    let workerUrl;
    try {
      const resp = await fetch('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');
      const code = await resp.text();
      workerUrl = URL.createObjectURL(new Blob([code], { type: 'application/javascript' }));
    } catch(e) {
      setStatus('could not load gif encoder: ' + e.message, 'error');
      btn.disabled = false;
      return;
    }

    const gif = new GIF({
      workers: 2,
      quality: 8,
      workerScript: workerUrl,
      width: width,
      height: height,
      repeat: 0
    });

    const frameCanvas = document.createElement('canvas');
    frameCanvas.width = width;
    frameCanvas.height = height;
    const fCtx = frameCanvas.getContext('2d');

    for (let i = 0; i < numFrames; i++) {
      const angle = (i / numFrames) * 2 * Math.PI;
      const xOffset = maxShift * Math.sin(angle);

      let framePixels = generateFrame(scaledSrc.data, depth, xOffset, width, height);
      framePixels = applyLightWrap(framePixels, depth, wrapRadius, width, height);
      framePixels = circularDiscBokeh(framePixels, depth, focusDist, cocScale, width, height);
      framePixels = applyChromaticAberration(framePixels, caStrength, angle, width, height);

      const imgData = fCtx.createImageData(width, height);
      imgData.data.set(framePixels);
      fCtx.putImageData(imgData, 0, 0);

      gif.addFrame(frameCanvas, { delay: frameDelay, copy: true });

      const pct = Math.round(((i + 1) / numFrames) * 50);
      setStatus(`building frames  ${i + 1}/${numFrames}`, 'working');
      setProgress(pct);

      await new Promise(r => setTimeout(r, 0));
    }

    gif.on('progress', p => {
      setProgress(50 + Math.round(p * 50));
      setStatus(`encoding  ${Math.round(p * 100)}%`, 'working');
    });

    gif.on('finished', blob => {
      URL.revokeObjectURL(workerUrl);
      showGifPreview(blob);

      const kb = Math.round(blob.size / 1024);
      setStatus(`done  \u00b7  ${width}\u00d7${height}  \u00b7  ${numFrames}f  \u00b7  ${kb}kb`, 'done');
      setProgress(-1);
      btn.disabled = false;
    });

    gif.render();
  };
</script>
</body>
